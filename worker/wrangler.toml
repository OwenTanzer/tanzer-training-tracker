name = "abbys-dog-chej-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# TODO: replace with the real ID once the D1 database is provisioned
# (`wrangler d1 create abbys-dog-chej` or the Cloudflare D1 MCP tools).
[[d1_databases]]
binding = "DB"
database_name = "abbys-dog-chej"
database_id = "REPLACE_WITH_REAL_D1_DATABASE_ID"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "abbys-dog-chej-photos"

[vars]
# Comma-separated list of frontend origins allowed to call this API.
ALLOWED_ORIGINS = "https://owentanzer.github.io,http://localhost:5173"
