name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://abbys-dog-chej-api.otmooper12.workers.dev

      - run: npm --prefix worker ci
      - run: npm --prefix worker run typecheck
