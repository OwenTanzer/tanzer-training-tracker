<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tanzer Training Tracker</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages has no server-side rewrite rule, so a hard refresh or
      // direct link to a client-side route (e.g. /Abbys-dog-chej/dog/123)
      // has no matching static file and 404s here instead. This encodes the
      // real path into a query string and redirects to the app's root,
      // where the script in index.html decodes it back before React Router
      // ever sees the URL.
      var pathSegmentsToKeep = 1; // keep "/Abbys-dog-chej"

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
